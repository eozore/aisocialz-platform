<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
    font-family: var(--font-family, 'Inter', sans-serif);
    background: var(--bg-color, #1A1A2E);
    color: var(--text-color, #FFFFFF);
  }
  .header {
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
  }
  .titulo {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--primary-color, #E94560);
  }
  .resumo {
    font-size: 32px;
    line-height: 1.5;
    opacity: 0.9;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    font-size: 24px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="header">AI NEWS</div>
  <div class="titulo">{{titulo}}</div>
  <div class="resumo">{{resumo}}</div>
  <div class="footer">
    <span>{{fonte}}</span>
    <span>{{data}}</span>
  </div>
</body>
</html>
