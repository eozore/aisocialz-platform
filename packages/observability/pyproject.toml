[project]
name = "observability"
version = "0.1.0"
description = "Logging estruturado, tracing, decision_log helper"
requires-python = ">=3.12"
dependencies = [
    "core-domain",
    "persistence",
    "structlog>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/observability"]

[tool.uv.sources]
core-domain = { workspace = true }
persistence = { workspace = true }
