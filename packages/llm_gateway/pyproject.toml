[project]
name = "llm-gateway"
version = "0.1.0"
description = "Wrapper único de LLM + ledger de custo — ninguém chama Vertex direto"
requires-python = ">=3.12"
dependencies = [
    "core-domain",
    "persistence",
    "google-cloud-aiplatform>=1.60",
    "anthropic[vertex]>=0.34",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_gateway"]

[tool.uv.sources]
core-domain = { workspace = true }
persistence = { workspace = true }
