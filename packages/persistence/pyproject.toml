[project]
name = "persistence"
version = "0.1.0"
description = "Acesso a Firestore com escopo de tenant obrigatório"
requires-python = ">=3.12"
dependencies = [
    "core-domain",
    "google-cloud-firestore>=2.16",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persistence"]

[tool.uv.sources]
core-domain = { workspace = true }
