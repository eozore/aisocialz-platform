[project]
name = "adapters"
version = "0.1.0"
description = "Contrato + implementações de canal (LinkedIn, Meta, Blog)"
requires-python = ">=3.12"
dependencies = [
    "core-domain",
    "persistence",
    "google-cloud-secret-manager>=2.20",
    "google-analytics-data>=0.18",
    "httpx>=0.27",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/adapters"]

[tool.uv.sources]
core-domain = { workspace = true }
persistence = { workspace = true }
