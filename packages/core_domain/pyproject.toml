[project]
name = "core-domain"
version = "0.1.0"
description = "Tipos de domínio da plataforma — SEM dependência de infra"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core_domain"]
